<section class="section">
  <h2>Zone Detail</h2>
  <div class="card">
    {% if zones %}
    <table>
      <thead>
        <tr>
          <th>Zone</th>
          <th>Type</th>
          <th>Orientation</th>
          <th>Area</th>
          <th>Rooms</th>
        </tr>
      </thead>
      <tbody>
        {% for zone in zones %}
        <tr>
          <td>{{ zone.name }}</td>
          <td>{{ zone.zone_type }}</td>
          <td>{{ zone.orientation }}</td>
          <td>{{ "%.0f"|format(zone.area_m2) }} m2</td>
          <td>{{ zone.room_count }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p class="muted">No functional zones are available for this project.</p>
    {% endif %}
  </div>
</section>
